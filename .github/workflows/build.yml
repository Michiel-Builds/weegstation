name: WeegStation Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build frontend + installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: Build weegserver ZIP
        run: npm run pak-weegserver

      - name: Verify build output
        shell: pwsh
        run: |
          Write-Host "=== release/electron-dist/ ==="
          Get-ChildItem release/electron-dist/ -File | Select-Object Name, Length | Format-Table -AutoSize
          if (-not (Test-Path release/electron-dist/latest.yml)) {
            Write-Host "FOUT: latest.yml niet gevonden" -ForegroundColor Red
            exit 1
          }
          npm run verify-release:local

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weegstation-build
          path: |
            release/electron-dist/*.exe
            release/electron-dist/*.blockmap
            release/electron-dist/latest.yml
            release/Weegserver.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/electron-dist/*.exe
            release/electron-dist/*.blockmap
            release/electron-dist/latest.yml
            release/Weegserver.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
