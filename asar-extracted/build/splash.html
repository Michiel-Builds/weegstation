<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f1011, #181a1b);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #66bb6a;
      -webkit-user-select: none;
      overflow: hidden;
    }
    .icon {
      width: 180px;
      height: 180px;
      background-image: url("icon-512.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      margin-bottom: 24px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50%      { transform: scale(1.05); opacity: 1; }
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      color: #66bb6a;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 14px;
      color: #8a8a8a;
      margin-top: 6px;
    }
    .loader {
      width: 200px;
      height: 3px;
      background: rgba(102, 187, 106, 0.15);
      border-radius: 2px;
      margin-top: 32px;
      overflow: hidden;
      position: relative;
    }
    .loader::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #66bb6a, transparent);
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { left: -40%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="icon"></div>
  <div class="title">NewTon+</div>
  <div class="subtitle">Metaalrecycling Bulters</div>
  <div class="loader"></div>
</body>
</html>
